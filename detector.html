<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANDRE_VISION // HANDS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#00ff41;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .topbar{background:#020a02;border-bottom:1px solid #0a1f0a;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .logo{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:900;color:#00ff41;letter-spacing:3px;text-shadow:0 0 10px #00ff41}
    .logo span{color:#00aaff}
    #clock{font-family:'Orbitron',monospace;font-size:0.72rem;color:#00ff41}
    .dot{width:7px;height:7px;border-radius:50%;background:#00ff41;box-shadow:0 0 6px #00ff41;animation:blink 1.5s infinite;display:inline-block;margin-right:4px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    .cam-wrap{position:relative;flex:1;background:#000;overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
    canvas{position:absolute;inset:0;width:100%;height:100%}

    .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#003310;text-align:center;gap:12px}
    .placeholder .icon{font-size:4rem;opacity:0.3}
    .placeholder p{font-size:0.8rem;letter-spacing:2px}

    .loading{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;z-index:10}
    .loading.show{display:flex}
    .load-title{font-family:'Orbitron',monospace;font-size:0.9rem;color:#00ff41;letter-spacing:3px}
    .load-bar-wrap{width:220px;height:6px;background:#001100;border:1px solid #00ff41}
    .load-bar{height:100%;background:#00ff41;box-shadow:0 0 8px #00ff41;width:0;transition:width 0.4s}
    .load-sub{font-size:0.7rem;color:#003310;letter-spacing:2px}

    .status-top{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:3px;padding:4px 14px;border:1px solid;display:none;white-space:nowrap}
    .status-top.show{display:block}
    .status-top.detected{color:#00aaff;border-color:#00aaff;text-shadow:0 0 10px #00aaff;background:rgba(0,170,255,0.1)}
    .status-top.clear{color:#003310;border-color:#003310;background:transparent}

    .fps-tag{position:absolute;top:10px;left:10px;font-size:0.6rem;color:#003310;letter-spacing:2px}

    /* FINGER COUNT */
    .finger-count{position:absolute;top:40px;right:12px;text-align:right}
    .finger-num{font-family:'Orbitron',monospace;font-size:2.5rem;font-weight:900;color:#00aaff;text-shadow:0 0 20px #00aaff;line-height:1}
    .finger-label{font-size:0.6rem;color:#003310;letter-spacing:2px}

    .bottom-bar{background:#020a02;border-top:1px solid #0a1f0a;padding:8px 16px;display:flex;gap:10px;justify-content:center;flex-shrink:0}
    .btn{padding:8px 20px;font-family:'Orbitron',monospace;font-size:0.68rem;letter-spacing:2px;border:none;cursor:pointer;transition:all 0.2s}
    .btn-start{background:#00ff41;color:#000;font-weight:700}
    .btn-stop{background:transparent;border:1px solid #ff0033;color:#ff0033}
    .btn-flip{background:transparent;border:1px solid #00aaff;color:#00aaff}

    .statusbar{background:#00ff41;color:#000;font-size:0.62rem;padding:2px 16px;display:flex;justify-content:space-between;letter-spacing:2px;flex-shrink:0}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">ANDRE<span>_VISION</span> // HANDS</div>
  <div style="display:flex;gap:12px;align-items:center;font-size:0.7rem">
    <span><span class="dot"></span>READY</span>
    <span id="clock"></span>
  </div>
</div>

<div class="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="fps-tag" id="fps">FPS: --</div>
  <div class="status-top" id="statusTop"></div>
  <div class="finger-count" id="fingerCount" style="display:none">
    <div class="finger-num" id="fingerNum">0</div>
    <div class="finger-label">FINGERS</div>
  </div>
  <div class="placeholder" id="placeholder">
    <div class="icon">✋</div>
    <p>TAP START</p>
    <p style="font-size:0.6rem;opacity:0.4">HAND DETECTION</p>
  </div>
  <div class="loading" id="loading">
    <div class="load-title">⚡ LOADING AI</div>
    <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
    <div class="load-sub" id="loadSub">Please wait...</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn btn-start" onclick="startCam()">▶ START</button>
  <button class="btn btn-flip" onclick="flipCam()">🔄 FLIP</button>
  <button class="btn btn-stop" onclick="stopCam()">⏹ STOP</button>
</div>

<div class="statusbar">
  <span>ANDRE_VISION // HAND TRACKER</span>
  <span id="statusBar">IDLE</span>
</div>

<script>
  setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString()},1000);

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let stream=null, running=false, handsModel=null;
  let facingMode='user';
  let frameCount=0, lastFpsTime=Date.now();
  let lastResults=null;

  // FINGER TIPS indices in MediaPipe
  const FINGER_TIPS = [4,8,12,16,20];
  const FINGER_BASE = [2,5,9,13,17];

  // Hand landmark colors
  const POINT_COLOR = '#00aaff';
  const LINE_COLOR = '#00ff41';

  // MediaPipe connections
  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],
    [0,17]
  ];

  async function startCam(){
    document.getElementById('placeholder').style.display='none';
    document.getElementById('statusBar').textContent='LOADING...';

    // Show loading
    const lo=document.getElementById('loading');
    const lb=document.getElementById('loadBar');
    const ls=document.getElementById('loadSub');
    lo.classList.add('show');

    try{
      // Init MediaPipe Hands
      ls.textContent='Loading hand model...';
      lb.style.width='30%';

      handsModel = new Hands({locateFile: file => 
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      handsModel.setOptions({
        maxNumHands: 2,
        modelComplexity: 0, // 0 = lite, lebih ringan!
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5
      });

      lb.style.width='60%';
      ls.textContent='Starting camera...';

      handsModel.onResults(onResults);

      // Start camera
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode, width:{ideal:320}, height:{ideal:240}},
        audio:false
      });
      video.srcObject = stream;
      await video.play();

      lb.style.width='100%';
      ls.textContent='✓ Ready!';
      setTimeout(()=>lo.classList.remove('show'), 600);

      running = true;
      document.getElementById('statusBar').textContent='TRACKING...';
      document.getElementById('statusTop').className='status-top show clear';
      document.getElementById('statusTop').textContent='NO HAND';
      document.getElementById('fingerCount').style.display='block';

      detectLoop();
    }catch(e){
      ls.textContent='ERROR: '+e.message;
      document.getElementById('statusBar').textContent='ERROR';
    }
  }

  async function detectLoop(){
    if(!running) return;
    canvas.width = video.videoWidth||320;
    canvas.height = video.videoHeight||240;

    // Mirror draw
    ctx.save();
    ctx.translate(canvas.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    ctx.restore();

    // Send to MediaPipe
    await handsModel.send({image: video});

    // Draw results
    if(lastResults) drawHands();

    // FPS
    frameCount++;
    const now=Date.now();
    if(now-lastFpsTime>=1000){
      document.getElementById('fps').textContent='FPS: '+frameCount;
      frameCount=0; lastFpsTime=now;
    }

    requestAnimationFrame(detectLoop);
  }

  function onResults(results){
    lastResults = results;
  }

  function drawHands(){
    if(!lastResults || !lastResults.multiHandLandmarks) return;
    const hands = lastResults.multiHandLandmarks;
    const st = document.getElementById('statusTop');
    const fn = document.getElementById('fingerNum');

    if(hands.length === 0){
      st.className='status-top show clear';
      st.textContent='NO HAND';
      fn.textContent='0';
      return;
    }

    st.className='status-top show detected';
    st.textContent='✋ HAND DETECTED: '+hands.length;

    let totalFingers = 0;

    hands.forEach((landmarks, hi) => {
      const W = canvas.width;
      const H = canvas.height;

      // Mirror x coords
      const pts = landmarks.map(lm => ({
        x: (1-lm.x)*W,
        y: lm.y*H
      }));

      // Draw connections
      ctx.strokeStyle = LINE_COLOR;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 8;
      ctx.shadowColor = LINE_COLOR;
      CONNECTIONS.forEach(([a,b])=>{
        ctx.beginPath();
        ctx.moveTo(pts[a].x, pts[a].y);
        ctx.lineTo(pts[b].x, pts[b].y);
        ctx.stroke();
      });

      // Draw points
      landmarks.forEach((_,i)=>{
        const p = pts[i];
        const isTip = FINGER_TIPS.includes(i);
        ctx.beginPath();
        ctx.arc(p.x, p.y, isTip?6:3, 0, Math.PI*2);
        ctx.fillStyle = isTip ? '#ff0033' : POINT_COLOR;
        ctx.shadowBlur = isTip?12:6;
        ctx.shadowColor = isTip?'#ff0033':POINT_COLOR;
        ctx.fill();
      });
      ctx.shadowBlur=0;

      // Count fingers up
      let fingers = 0;
      // Thumb - compare x (mirrored)
      if(pts[4].x > pts[2].x) fingers++;
      // Other fingers - compare y
      for(let i=1;i<5;i++){
        if(pts[FINGER_TIPS[i]].y < pts[FINGER_BASE[i]].y) fingers++;
      }
      totalFingers += fingers;

      // Label per hand
      const handLabel = lastResults.multiHandedness?.[hi]?.label || 'Hand';
      ctx.fillStyle='rgba(0,0,0,0.7)';
      const bx=pts[0].x-20, by=pts[0].y+10;
      ctx.fillRect(bx,by,90,18);
      ctx.fillStyle='#00aaff';
      ctx.font='bold 10px Share Tech Mono';
      ctx.fillText(handLabel.toUpperCase()+' '+fingers+'✋',bx+3,by+13);
    });

    fn.textContent = totalFingers;
    document.getElementById('statusBar').textContent = 'FINGERS: '+totalFingers;
  }

  function stopCam(){
    running=false;
    if(stream) stream.getTracks().forEach(t=>t.stop());
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('placeholder').style.display='flex';
    document.getElementById('statusTop').className='status-top';
    document.getElementById('fingerCount').style.display='none';
    document.getElementById('statusBar').textContent='IDLE';
    document.getElementById('fps').textContent='FPS: --';
    lastResults=null;
  }

  async function flipCam(){
    facingMode=facingMode==='user'?'environment':'user';
    if(running){
      running=false;
      if(stream) stream.getTracks().forEach(t=>t.stop());
      await startCam();
    }
  }
</script>
</body>
</html>
