<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANDRE_VISION // HUMAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#00ff41;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .topbar{background:#020a02;border-bottom:1px solid #0a1f0a;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .logo{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:900;color:#00ff41;letter-spacing:3px;text-shadow:0 0 10px #00ff41}
    .logo span{color:#ff0033}
    #clock{font-family:'Orbitron',monospace;font-size:0.72rem;color:#00ff41}
    .dot{width:7px;height:7px;border-radius:50%;background:#00ff41;box-shadow:0 0 6px #00ff41;animation:blink 1.5s infinite;display:inline-block;margin-right:4px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    .cam-wrap{position:relative;flex:1;background:#111;overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
    canvas{position:absolute;inset:0;width:100%;height:100%}

    .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#003310;text-align:center;gap:12px}
    .placeholder .icon{font-size:4rem;opacity:0.3}
    .placeholder p{font-size:0.8rem;letter-spacing:2px}

    .loading{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;z-index:10}
    .loading.show{display:flex}
    .load-title{font-family:'Orbitron',monospace;font-size:0.9rem;color:#00ff41;letter-spacing:3px}
    .load-bar-wrap{width:220px;height:6px;background:#001100;border:1px solid #00ff41}
    .load-bar{height:100%;background:#00ff41;box-shadow:0 0 8px #00ff41;width:0;transition:width 0.4s}
    .load-sub{font-size:0.7rem;color:#003310;letter-spacing:2px}

    /* STATUS TOP */
    .status-top{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:3px;padding:4px 14px;border:1px solid;display:none}
    .status-top.show{display:block}
    .status-top.detected{color:#ff0033;border-color:#ff0033;text-shadow:0 0 10px #ff0033;background:rgba(255,0,51,0.1);animation:pulse 0.6s infinite}
    .status-top.clear{color:#00ff41;border-color:#00ff41;text-shadow:0 0 10px #00ff41;background:rgba(0,255,65,0.05)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

    .fps-tag{position:absolute;top:10px;left:10px;font-size:0.6rem;color:#003310;letter-spacing:2px}

    .bottom-bar{background:#020a02;border-top:1px solid #0a1f0a;padding:8px 16px;display:flex;gap:10px;justify-content:center;flex-shrink:0}
    .btn{padding:8px 20px;font-family:'Orbitron',monospace;font-size:0.68rem;letter-spacing:2px;border:none;cursor:pointer;transition:all 0.2s}
    .btn-start{background:#00ff41;color:#000;font-weight:700}
    .btn-stop{background:transparent;border:1px solid #ff0033;color:#ff0033}
    .btn-flip{background:transparent;border:1px solid #00aaff;color:#00aaff}

    .statusbar{background:#00ff41;color:#000;font-size:0.62rem;padding:2px 16px;display:flex;justify-content:space-between;letter-spacing:2px;flex-shrink:0}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">ANDRE<span>_VISION</span></div>
  <div style="display:flex;gap:12px;align-items:center;font-size:0.7rem">
    <span><span class="dot"></span>READY</span>
    <span id="clock"></span>
  </div>
</div>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div class="fps-tag" id="fps">FPS: --</div>
  <div class="status-top" id="statusTop"></div>

  <div class="placeholder" id="placeholder">
    <div class="icon">👁️</div>
    <p>TAP START</p>
    <p style="font-size:0.6rem;opacity:0.4">HUMAN DETECTION</p>
  </div>

  <div class="loading" id="loading">
    <div class="load-title">⚡ LOADING AI</div>
    <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
    <div class="load-sub" id="loadSub">Please wait...</div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn btn-start" onclick="startCam()">▶ START</button>
  <button class="btn btn-flip" onclick="flipCam()">🔄 FLIP</button>
  <button class="btn btn-stop" onclick="stopCam()">⏹ STOP</button>
</div>

<div class="statusbar">
  <span>ANDRE_VISION // HUMAN DETECTOR</span>
  <span id="statusBar">IDLE</span>
</div>

<script>
  setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString()},1000);

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let stream=null, running=false, model=null;
  let facingMode='environment'; // default kamera belakang
  let frameCount=0, lastFpsTime=Date.now();
  let predictions=[];
  let detecting=false;

  async function loadModel(){
    const lo=document.getElementById('loading');
    const lb=document.getElementById('loadBar');
    const ls=document.getElementById('loadSub');
    lo.classList.add('show');
    try{
      ls.textContent='Loading model...';
      lb.style.width='40%';
      model=await cocoSsd.load({base:'lite_mobilenet_v2'});
      lb.style.width='100%';
      ls.textContent='✓ Ready!';
      setTimeout(()=>lo.classList.remove('show'),600);
      document.getElementById('statusBar').textContent='READY';
    }catch(e){
      ls.textContent='ERROR: '+e.message;
    }
  }

  async function startCam(){
    document.getElementById('placeholder').style.display='none';
    document.getElementById('statusBar').textContent='STARTING...';
    if(!model) await loadModel();
    if(stream) stream.getTracks().forEach(t=>t.stop());
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode,width:{ideal:320},height:{ideal:240}},audio:false
      });
      video.srcObject=stream;
      video.style.display='block';
      await video.play();
      running=true;
      document.getElementById('statusBar').textContent='DETECTING...';
      document.getElementById('statusTop').className='status-top show clear';
      document.getElementById('statusTop').textContent='SCANNING...';
      requestAnimationFrame(drawLoop);
    }catch(e){
      alert('Camera error: '+e.message);
    }
  }

  function stopCam(){
    running=false;
    if(stream) stream.getTracks().forEach(t=>t.stop());
    video.style.display='none';
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('placeholder').style.display='flex';
    document.getElementById('statusTop').className='status-top';
    document.getElementById('statusBar').textContent='IDLE';
    document.getElementById('fps').textContent='FPS: --';
    predictions=[];
  }

  async function flipCam(){
    facingMode=facingMode==='user'?'environment':'user';
    if(running) await startCam();
  }

  async function drawLoop(){
    if(!running) return;

    // Resize canvas
    if(canvas.width!==video.videoWidth||canvas.height!==video.videoHeight){
      canvas.width=video.videoWidth||320;
      canvas.height=video.videoHeight||240;
    }

    // Draw video
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    // Draw boxes
    drawBoxes();

    // FPS
    frameCount++;
    const now=Date.now();
    if(now-lastFpsTime>=1000){
      document.getElementById('fps').textContent='FPS: '+frameCount;
      frameCount=0; lastFpsTime=now;
    }

    // Detect async (non-blocking)
    if(!detecting && model && video.readyState>=2){
      detecting=true;
      model.detect(video).then(res=>{
        predictions=res.filter(p=>p.class==='person');
        updateStatus();
        detecting=false;
      }).catch(()=>{detecting=false});
    }

    requestAnimationFrame(drawLoop);
  }

  function updateStatus(){
    const st=document.getElementById('statusTop');
    if(predictions.length>0){
      st.className='status-top show detected';
      st.textContent='⚠ HUMAN DETECTED: '+predictions.length;
    } else {
      st.className='status-top show clear';
      st.textContent='SCANNING...';
    }
  }

  function drawBoxes(){
    predictions.forEach(p=>{
      const[x,y,w,h]=p.bbox;
      const conf=Math.round(p.score*100);

      // Main box
      ctx.strokeStyle='#ff0033';
      ctx.lineWidth=2;
      ctx.shadowBlur=15;
      ctx.shadowColor='#ff0033';
      ctx.strokeRect(x,y,w,h);
      ctx.shadowBlur=0;

      // Corner brackets
      const cs=12;
      ctx.lineWidth=3;
      ctx.strokeStyle='#ff0033';
      [
        [x,y,cs,0,0,cs],
        [x+w,y,-cs,0,0,cs],
        [x,y+h,cs,0,0,-cs],
        [x+w,y+h,-cs,0,0,-cs]
      ].forEach(([px,py,dx1,dy1,dx2,dy2])=>{
        ctx.beginPath();
        ctx.moveTo(px+dx1,py+dy1);
        ctx.lineTo(px,py);
        ctx.lineTo(px+dx2,py+dy2);
        ctx.stroke();
      });

      // Label box
      ctx.fillStyle='rgba(255,0,51,0.85)';
      ctx.fillRect(x,y-22,w,20);

      // Label text
      ctx.fillStyle='#fff';
      ctx.font='bold 11px Share Tech Mono';
      ctx.shadowBlur=0;
      ctx.fillText('HUMAN '+conf+'%',x+5,y-7);

      // Center cross
      const cx=x+w/2, cy=y+h/2;
      ctx.strokeStyle='rgba(255,0,51,0.5)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx-12,cy);ctx.lineTo(cx+12,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-12);ctx.lineTo(cx,cy+12);ctx.stroke();
    });
  }

  loadModel();
</script>
</body>
</html>
